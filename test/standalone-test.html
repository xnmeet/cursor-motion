<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Motion JS - Test v3 (100% Aligned)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1c2e;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e0e4f0;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
#stage {
  position: relative;
  width: 100%;
  height: 100%;
}
.target {
  position: absolute;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(120,160,255,0.25), rgba(60,80,180,0.08));
  border: 1.5px solid rgba(140,170,255,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: rgba(200,220,255,0.8);
  cursor: pointer;
  transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
  user-select: none;
}
.target:hover { border-color: rgba(180,210,255,0.7); transform: scale(1.08); }
.target.hit {
  animation: pulse 0.35s ease-out;
  border-color: rgba(100,255,180,0.8);
  box-shadow: 0 0 18px rgba(100,255,180,0.3);
}
@keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(0.88)} 100%{transform:scale(1)} }
#controls {
  position: absolute; top: 16px; left: 16px;
  background: rgba(20,22,40,0.92);
  border: 1px solid rgba(100,120,180,0.25);
  border-radius: 12px; padding: 16px 18px;
  backdrop-filter: blur(12px);
  min-width: 220px;
}
#controls h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(160,180,220,0.7); margin-bottom: 10px; }
.slider-row { display: flex; align-items: center; margin-bottom: 8px; }
.slider-row label { font-size: 11px; width: 90px; color: rgba(180,200,240,0.85); }
.slider-row input[type=range] { flex: 1; height: 4px; accent-color: #7b9cf5; }
.slider-row .val { font-size: 10px; width: 36px; text-align: right; color: rgba(140,160,200,0.7); }
#toggles { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
.toggle { font-size: 10px; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(100,130,200,0.3); background: rgba(40,50,80,0.5); cursor: pointer; }
.toggle.on { background: rgba(80,120,220,0.4); border-color: rgba(140,180,255,0.6); color: #fff; }
#info {
  position: absolute; bottom: 16px; left: 16px;
  font-size: 11px; color: rgba(140,160,200,0.6);
  background: rgba(20,22,40,0.8); padding: 8px 12px; border-radius: 8px;
}
#run-btn {
  position: absolute; top: 16px; right: 16px;
  font-size: 12px; padding: 8px 18px; border-radius: 8px;
  background: linear-gradient(135deg, #5b7cf5, #7b5cf5);
  border: none; color: #fff; cursor: pointer; font-weight: 600;
}
#run-btn:hover { filter: brightness(1.15); }
#run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="stage">
  <div id="controls">
    <h3>Parameters</h3>
    <div class="slider-row"><label>START HANDLE</label><input type="range" min="0" max="100" value="29" id="s-start"><span class="val" id="v-start">0.29</span></div>
    <div class="slider-row"><label>END HANDLE</label><input type="range" min="0" max="100" value="8" id="s-end"><span class="val" id="v-end">0.08</span></div>
    <div class="slider-row"><label>ARC SIZE</label><input type="range" min="0" max="100" value="6" id="s-arc"><span class="val" id="v-arc">0.06</span></div>
    <div class="slider-row"><label>ARC FLOW</label><input type="range" min="0" max="100" value="64" id="s-flow"><span class="val" id="v-flow">0.64</span></div>
    <div class="slider-row"><label>SPRING</label><input type="range" min="0" max="100" value="50" id="s-spring"><span class="val" id="v-spring">0.50</span></div>
    <div id="toggles">
      <span class="toggle on" id="t-trail">Trail</span>
      <span class="toggle on" id="t-cands">Candidates</span>
      <span class="toggle" id="t-idle">Idle Wiggle</span>
    </div>
  </div>
  <button id="run-btn">Run Sequence</button>
  <div id="info">Click anywhere or click targets to test. Phase: <span id="i-phase">idle</span> | Pos: <span id="i-pos">-</span> | Angle: <span id="i-angle">-</span></div>
</div>

<script>
// ============================================================
// vec2
// ============================================================
const EPS = 1e-9;
function vec_add(a,b){return{x:a.x+b.x,y:a.y+b.y}}
function vec_sub(a,b){return{x:a.x-b.x,y:a.y-b.y}}
function vec_scale(a,s){return{x:a.x*s,y:a.y*s}}
function vec_length(a){return Math.hypot(a.x,a.y)}
function vec_normalize(a,fb={x:1,y:0}){const l=vec_length(a);return l<EPS?fb:{x:a.x/l,y:a.y/l}}
function perpendicular(a){return{x:-a.y,y:a.x}}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function signedAngle(l,r){return Math.atan2(l.x*r.y-l.y*r.x,l.x*r.x+l.y*r.y)}
function pointInBounds(p,b,pad=0){
  if(!b)return true;
  return p.x>=b.minX-pad&&p.x<=b.maxX+pad&&p.y>=b.minY-pad&&p.y<=b.maxY+pad;
}

// ============================================================
// path
// ============================================================
function makeSegment(end,c1,c2){return{end,control1:c1,control2:c2}}
function makePath({start,end,startControl=null,endControl=null,segments}){
  return{start,end,startControl,endControl,segments};
}
function sampleCubic(p0,c1,c2,p1,t){
  const o=1-t,o2=o*o,t2=t*t;
  return{x:o2*o*p0.x+3*o2*t*c1.x+3*o*t2*c2.x+t2*t*p1.x,
         y:o2*o*p0.y+3*o2*t*c1.y+3*o*t2*c2.y+t2*t*p1.y};
}
function sampleCubicTangent(p0,c1,c2,p1,t){
  const o=1-t;
  return{x:3*o*o*(c1.x-p0.x)+6*o*t*(c2.x-c1.x)+3*t*t*(p1.x-c2.x),
         y:3*o*o*(c1.y-p0.y)+6*o*t*(c2.y-c1.y)+3*t*t*(p1.y-c2.y)};
}
function samplePath(path,progress){
  const segs=path.segments;
  if(!segs||!segs.length)return{point:path.start,tangent:{x:1,y:0}};
  const c=clamp(progress,0,1),n=segs.length;
  let si,lt;
  if(c>=1){si=n-1;lt=1}else{const s=c*n;si=Math.min(Math.floor(s),n-1);lt=s-si}
  const seg=segs[si];
  const segStart=si===0?path.start:segs[si-1].end;
  const pt=sampleCubic(segStart,seg.control1,seg.control2,seg.end,lt);
  const tg=sampleCubicTangent(segStart,seg.control1,seg.control2,seg.end,lt);
  return{point:pt,tangent:vec_normalize(tg,{x:1,y:0})};
}
function measurePath(path,bounds=null){
  let len=0,ace=0,mac=0,tt=0;
  let sib=bounds?pointInBounds(path.start,bounds,20):true;
  let prev=path.start,prevA=null;
  const steps=Math.max(path.segments.length*24,1);
  for(let i=1;i<=steps;i++){
    const{point}=samplePath(path,i/steps);
    const dx=point.x-prev.x,dy=point.y-prev.y,sl=Math.hypot(dx,dy);
    if(bounds&&sib)sib=pointInBounds(point,bounds,20);
    if(sl>0.01){
      const a=Math.atan2(dy,dx);len+=sl;
      if(prevA!==null){let d=a-prevA;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;ace+=d*d;const ab=Math.abs(d);if(ab>mac)mac=ab;tt+=ab}
      prevA=a;prev=point;
    }
  }
  return{length:len,angleChangeEnergy:ace,maxAngleChange:mac,totalTurn:tt,staysInBounds:sib};
}

// ============================================================
// spring (progress)
// ============================================================
const TWO_PI=Math.PI*2;
function buildSpringConfig({response=1.4,dampingFraction=0.9,dt=1/240,idleVelocityThreshold=28800,closeEnoughProgressThreshold=1,closeEnoughDistanceThreshold=0.01}={}){
  const raw=response>0?Math.pow(TWO_PI/response,2):Infinity;
  const stiffness=Math.min(raw,idleVelocityThreshold);
  const drag=2*dampingFraction*Math.sqrt(stiffness);
  return{response,dampingFraction,stiffness,drag,dt,closeEnoughProgressThreshold,closeEnoughDistanceThreshold,idleVelocityThreshold};
}
const OFFICIAL_SPRING=buildSpringConfig();
function makeSpringState(){return{time:0,velocity:0,force:0}}
function advanceStep(cur,tgt,s,cfg){
  const h=cfg.dt*0.5;
  const vh=s.velocity+s.force*h;
  const nc=cur+vh*cfg.dt;
  const f=cfg.stiffness*(tgt-nc)+(-cfg.drag)*vh;
  return[nc,{time:s.time+cfg.dt,velocity:vh+f*h,force:f}];
}
function advanceTo(cur,tgt,s,tt,cfg){
  let c=cur,st=s;const gap=tt-st.time;
  if(gap>1)st={...st,time:tt-1/60};
  let safe=0;const mx=Math.max(8192,Math.ceil(gap/cfg.dt)+64);
  while(st.time<tt&&safe<mx){[c,st]=advanceStep(c,tgt,st,cfg);safe++}
  return[c,st];
}
function isCloseEnough(p,t,cfg){return p>=cfg.closeEnoughProgressThreshold&&Math.abs(t-p)<=cfg.closeEnoughDistanceThreshold}
function computeCloseEnoughTime(cfg){
  let c=0,s=makeSpringState();
  for(let i=1;i<4096;i++){const t=i*cfg.dt;[c,s]=advanceTo(c,1,s,t,cfg);if(isCloseEnough(c,1,cfg))return s.time}
  return 1.43;
}

// ============================================================
// candidates
// ============================================================
const DESCRIPTORS=[
  {id:'direct',family:'direct',kind:'base',side:0,arcScale:0.55,startReachScale:1.0,endReachScale:1.0,startNormalScale:0.35,endNormalScale:0.35,startLineWeight:1.0,startHeadingWeight:0.45,startGuideNormalBias:0.0,endLineWeight:1.0,endHeadingWeight:0.55,endGuideNormalBias:0.0,flowShift:0,startFlowWeight:0.7,endFlowWeight:0.7,scoreBias:0},
  {id:'turn-left',family:'turn',kind:'arched',side:-1,arcScale:1.0,startReachScale:1.05,endReachScale:0.95,startNormalScale:1.0,endNormalScale:0.5,startLineWeight:0.55,startHeadingWeight:0.85,startGuideNormalBias:0.25,endLineWeight:0.85,endHeadingWeight:0.55,endGuideNormalBias:0.05,flowShift:-0.05,startFlowWeight:0.9,endFlowWeight:0.6,scoreBias:0},
  {id:'turn-right',family:'turn',kind:'arched',side:1,arcScale:1.0,startReachScale:1.05,endReachScale:0.95,startNormalScale:1.0,endNormalScale:0.5,startLineWeight:0.55,startHeadingWeight:0.85,startGuideNormalBias:0.25,endLineWeight:0.85,endHeadingWeight:0.55,endGuideNormalBias:0.05,flowShift:-0.05,startFlowWeight:0.9,endFlowWeight:0.6,scoreBias:0},
  {id:'brake-left',family:'brake',kind:'arched',side:-1,arcScale:0.9,startReachScale:0.85,endReachScale:1.15,startNormalScale:0.4,endNormalScale:1.0,startLineWeight:0.85,startHeadingWeight:0.5,startGuideNormalBias:0.05,endLineWeight:0.55,endHeadingWeight:0.85,endGuideNormalBias:0.25,flowShift:0.07,startFlowWeight:0.6,endFlowWeight:0.9,scoreBias:6},
  {id:'brake-right',family:'brake',kind:'arched',side:1,arcScale:0.9,startReachScale:0.85,endReachScale:1.15,startNormalScale:0.4,endNormalScale:1.0,startLineWeight:0.55,startHeadingWeight:0.85,startGuideNormalBias:0.25,endLineWeight:0.85,endHeadingWeight:0.5,endGuideNormalBias:0.05,flowShift:0.07,startFlowWeight:0.6,endFlowWeight:0.9,scoreBias:6},
  {id:'orbit-left',family:'orbit',kind:'arched',side:-1,arcScale:1.35,startReachScale:1.15,endReachScale:1.15,startNormalScale:1.0,endNormalScale:1.0,startLineWeight:0.5,startHeadingWeight:0.9,startGuideNormalBias:0.35,endLineWeight:0.5,endHeadingWeight:0.9,endGuideNormalBias:0.35,flowShift:0,startFlowWeight:0.8,endFlowWeight:0.8,scoreBias:12},
  {id:'orbit-right',family:'orbit',kind:'arched',side:1,arcScale:1.35,startReachScale:1.15,endReachScale:1.15,startNormalScale:1.0,endNormalScale:1.0,startLineWeight:0.5,startHeadingWeight:0.9,startGuideNormalBias:0.35,endLineWeight:0.5,endHeadingWeight:0.9,endGuideNormalBias:0.35,flowShift:0,startFlowWeight:0.8,endFlowWeight:0.8,scoreBias:12},
];
function resolveGuide({line,forward,normal,sideSign,lineWeight,headingWeight,normalBias}){
  const lin=vec_scale(line,lineWeight),fwd=vec_scale(forward,headingWeight),nrm=vec_scale(normal,normalBias*sideSign);
  return vec_normalize({x:lin.x+fwd.x+nrm.x,y:lin.y+fwd.y+nrm.y},line);
}
function makePathFromDescriptor({start,end,descriptor:d,startForward,endForward,params}){
  const delta=vec_sub(end,start),dist=Math.max(vec_length(delta),1),dir=vec_normalize(delta,{x:1,y:0}),norm=perpendicular(dir);
  const ff=Math.min(dist/800,1);
  const sh=params.startHandle??0.29,eh=params.endHandle??0.08,as=params.arcSize??0.06,af=params.arcFlow??0.64;
  const rf=clamp(af+d.flowShift,0,1),fb=(rf-0.5)*dist*0.18;
  const bsr=dist*(0.10+sh*0.56),ber=dist*(0.11+eh*0.62),dl=0.68+ff*0.56;
  const bah=Math.min(Math.max(dist*(0.10+as*0.92)*d.arcScale*dl,20),dist*0.96);
  const ss=d.side,av={x:norm.x*bah*ss,y:norm.y*bah*ss};
  const sg=resolveGuide({line:dir,forward:startForward,normal:norm,sideSign:ss,lineWeight:d.startLineWeight,headingWeight:d.startHeadingWeight,normalBias:d.startGuideNormalBias});
  const eg=resolveGuide({line:dir,forward:endForward,normal:norm,sideSign:ss,lineWeight:d.endLineWeight,headingWeight:d.endHeadingWeight,normalBias:d.endGuideNormalBias});
  const sr=Math.max(bsr*d.startReachScale+fb*d.startFlowWeight,12);
  const er=Math.max(ber*d.endReachScale-fb*d.endFlowWeight,12);
  const c1b=vec_add(start,vec_scale(sg,sr)),c2b=vec_sub(end,vec_scale(eg,er));
  const c1={x:c1b.x+av.x*d.startNormalScale,y:c1b.y+av.y*d.startNormalScale};
  const c2={x:c2b.x+av.x*d.endNormalScale,y:c2b.y+av.y*d.endNormalScale};
  return makePath({start,end,startControl:c1,endControl:c2,segments:[makeSegment(end,c1,c2)]});
}
function makeCandidates({start,end,bounds=null,startForward={x:1,y:0},endForward={x:1,y:0},params={}}){
  const sf=vec_normalize(startForward,{x:1,y:0}),ef=vec_normalize(endForward,{x:1,y:0});
  const dist=Math.max(vec_length(vec_sub(end,start)),1);
  const delta2=vec_sub(end,start),dir2=vec_normalize(delta2,{x:1,y:0});
  const cross=sf.x*dir2.y-sf.y*dir2.x;
  const ps=cross>0.05?1:cross<-0.05?-1:0;
  const st2=Math.abs(signedAngle(sf,dir2)),et2=Math.abs(signedAngle(dir2,ef));
  const td=Math.min(1,(st2+et2)/Math.PI),dn=1-td;
  return DESCRIPTORS.map(d=>{
    const path=makePathFromDescriptor({start,end,descriptor:d,startForward:sf,endForward:ef,params});
    const m=measurePath(path,bounds);
    const el=Math.max(m.length/dist-1,0);
    let score=d.scoreBias;
    score+=el*180+m.angleChangeEnergy*90+m.maxAngleChange*85+m.totalTurn*(d.side===0?10:12);
    if(d.side===0)score+=td*130;else{score+=dn*90;if(d.side!==ps&&ps!==0)score+=Math.max(td,0.45)*200}
    if(!m.staysInBounds)score+=45;
    return{id:d.id,kind:d.kind,side:d.side,path,measurement:m,score};
  });
}
function chooseCandidate(cands){
  if(!cands||!cands.length)return null;
  const ib=cands.filter(c=>c.measurement.staysInBounds);
  const pool=ib.length>0?ib:cands;
  let best=pool[0];for(const c of pool)if(c.score<best.score)best=c;
  return best;
}

// ============================================================
// Visual Dynamics — 100% aligned with reference
// tipSpring(0.18, 0.76), angleSpring(0.24, 0.82)
// baseHeading = -(3π/4), headingVelocityFloor = 14
// bodyLateral: scale=0.06, max=1.4
// ============================================================
function makeVisualSpring(response,dampingFraction,dt=1/240){
  const raw=response>0?Math.pow(2*Math.PI/response,2):Infinity;
  const stiffness=Math.min(raw,28800);
  const drag=2*dampingFraction*Math.sqrt(stiffness);
  return{stiffness,drag,dt};
}
const TIP_SPRING=makeVisualSpring(0.18,0.76);
const ANGLE_SPRING=makeVisualSpring(0.24,0.82);
const BASE_HEADING=-(3*Math.PI/4);
const HEADING_VEL_FLOOR=14;
const WOBBLE_AMP=Math.PI/12;
const BODY_OFFSET_SCALE=0.0012, BODY_OFFSET_MAX=2.4;
const BODY_LATERAL_SCALE=0.06, BODY_LATERAL_MAX=1.4;
const FOG_OFFSET_SCALE=0.0045, FOG_OFFSET_MAX=9;
const FOG_OPACITY_BASE=0.12, FOG_OPACITY_VEL=0.00006;
const FOG_SCALE_VEL=0.00012, FOG_SCALE_MAX_D=0.22;

function normalizeAngle(a){let v=a;while(v>Math.PI)v-=2*Math.PI;while(v<-Math.PI)v+=2*Math.PI;return v}

class VisualDynamics {
  constructor(){this.tip=null;this.tvx=0;this.tvy=0;this.tfx=0;this.tfy=0;this.angle=0;this.av=0;this.af=0;this.time=0}
  reset(p){this.tip={x:p.x,y:p.y};this.tvx=0;this.tvy=0;this.tfx=0;this.tfy=0;this.angle=0;this.av=0;this.af=0;this.time=0}
  advance(target,targetTime,{idleAngleOffset=0}={}){
    if(!this.tip){this.tip={x:target.x,y:target.y};this.time=targetTime;return this._render(idleAngleOffset)}
    if((targetTime-this.time)>1)this.time=targetTime-1/60;
    while(this.time<targetTime)this._step(target);
    return this._render(idleAngleOffset);
  }
  _step(tp){
    const dt=TIP_SPRING.dt,h=dt*0.5;
    // tip 2D Velocity-Verlet
    const vhx=this.tvx+this.tfx*h, vhy=this.tvy+this.tfy*h;
    const nx=this.tip.x+vhx*dt, ny=this.tip.y+vhy*dt;
    const dx=tp.x-nx, dy=tp.y-ny;
    const fx=dx*TIP_SPRING.stiffness+(-TIP_SPRING.drag)*vhx;
    const fy=dy*TIP_SPRING.stiffness+(-TIP_SPRING.drag)*vhy;
    this.tvx=vhx+fx*h; this.tvy=vhy+fy*h;
    this.tfx=fx; this.tfy=fy;
    this.tip={x:nx,y:ny};
    // angle 1D Velocity-Verlet
    const speed=Math.hypot(this.tvx,this.tvy);
    const ta = speed>HEADING_VEL_FLOOR ? normalizeAngle(Math.atan2(this.tvy,this.tvx)-BASE_HEADING) : 0;
    const avh=this.av+this.af*h;
    const na=normalizeAngle(this.angle+avh*dt);
    const ae=normalizeAngle(ta-na);
    const aforce=ae*ANGLE_SPRING.stiffness+(-ANGLE_SPRING.drag)*avh;
    this.av=avh+aforce*h;
    this.af=aforce;
    this.angle=normalizeAngle(na);
    this.time+=dt;
  }
  _render(iao){
    const speed=Math.hypot(this.tvx,this.tvy);
    const ci=clamp(iao,-0.28,0.28);
    const rot=normalizeAngle(this.angle+ci);
    // Direction: velocity-based or fallback to baseHeading+idle
    let dirx,diry;
    if(speed>0.001){dirx=this.tvx/speed;diry=this.tvy/speed}
    else{const fa=BASE_HEADING+iao;dirx=Math.cos(fa);diry=Math.sin(fa)}
    // Body backward
    const bm=-Math.min(speed*BODY_OFFSET_SCALE,BODY_OFFSET_MAX);
    const bbx=dirx*bm, bby=diry*bm;
    // Body lateral (perpendicular, driven by angleVelocity)
    const lat=clamp(this.av*BODY_LATERAL_SCALE,-BODY_LATERAL_MAX,BODY_LATERAL_MAX);
    const blx=-diry*lat, bly=dirx*lat;
    const bodyOffset={x:bbx+blx,y:bby+bly};
    // Fog offset: backward + lateral*0.6
    const fm=-Math.min(speed*FOG_OFFSET_SCALE,FOG_OFFSET_MAX);
    const fogOffset={x:dirx*fm+blx*0.6, y:diry*fm+bly*0.6};
    const fogOpacity=Math.min(FOG_OPACITY_BASE+speed*FOG_OPACITY_VEL,0.34);
    const fogScale=1+Math.min(speed*FOG_SCALE_VEL,FOG_SCALE_MAX_D);
    return{tip:this.tip,angle:rot,velocity:{x:this.tvx,y:this.tvy},angleVelocity:this.av,bodyOffset,fogOffset,fogOpacity,fogScale};
  }
}

// ============================================================
// Engine
// ============================================================
class CursorMotionEngine {
  constructor({initial={x:0,y:0},bounds=null,spring=OFFICIAL_SPRING,params={},onUpdate=()=>{},idle=true}={}){
    this.bounds=bounds;this.spring=spring;
    this.params={startHandle:0.29,endHandle:0.08,arcSize:0.06,arcFlow:0.64,...params};
    this.onUpdate=onUpdate;this.duration=computeCloseEnoughTime(spring);
    this.idleEnabled=idle;this.position={x:initial.x,y:initial.y};
    this.target={...this.position};this.heading={x:1,y:0};this.phase='idle';
    this.idlePhase=0;this.clickProgress=0;
    this.dynamics=new VisualDynamics();this.dynamics.reset(this.position);
    this._rafId=null;this._move=null;this._lastTime=null;
    if(this.idleEnabled)this._startLoop();
  }
  setParams(p){this.params={...this.params,...p}}
  setSpring(cfg){this.spring=cfg;this.duration=computeCloseEnoughTime(cfg)}
  moveTo(target){
    if(this._move){this._move.cancelled=true;this._move.reject?.(new Error('superseded'));this._move=null}
    const start={...this.position};
    const cands=makeCandidates({start,end:target,bounds:this.bounds,startForward:this.heading,endForward:{x:1,y:0},params:this.params});
    const chosen=chooseCandidate(cands);
    if(!chosen){this.position={...target};return Promise.resolve()}
    return new Promise((resolve,reject)=>{
      this.phase='moving';
      this._move={resolve,reject,cancelled:false,startTime:null,path:chosen.path,candidate:chosen,candidates:cands,progress:0,spring:makeSpringState(),target:{...target}};
      this.target={...target};this._startLoop();
    });
  }
  click({count=1,holdMs=110,gapMs=50}={}){
    return new Promise(resolve=>{
      this.phase='clicking';let pulse=0;
      const next=()=>{
        if(pulse>=count){this.clickProgress=0;this.phase='idle';resolve();return}
        const st=performance.now();
        const tick=()=>{
          const t=Math.min((performance.now()-st)/holdMs,1);
          this.clickProgress=Math.sin(t*Math.PI);
          this._emit(performance.now()/1000);
          if(t<1)requestAnimationFrame(tick);
          else{this.clickProgress=0;pulse++;pulse<count?setTimeout(next,gapMs):next()}
        };requestAnimationFrame(tick);
      };next();
    });
  }
  stop(){if(this._move){this._move.reject?.(new Error('stopped'));this._move=null}this.phase='idle'}
  destroy(){this.stop();if(this._rafId!=null){cancelAnimationFrame(this._rafId);this._rafId=null}}
  _startLoop(){
    if(this._rafId!=null)return;
    const tick=ms=>{this._rafId=null;this._step(ms/1000);if(this._rafId==null)this._rafId=requestAnimationFrame(tick)};
    this._rafId=requestAnimationFrame(tick);
  }
  _step(now){
    // Compute clamped delta like reference: [1/240, 1/24]
    const rawDt=this._lastTime!=null?(now-this._lastTime):(1/60);
    const cdt=Math.max(1/240,Math.min(rawDt,1/24));
    this._lastTime=now;

    if(this._move){
      const m=this._move;
      if(m.startTime==null)m.startTime=now;
      const elapsed=now-m.startTime;
      const norm=clamp(elapsed/this.duration,0,1);
      const springTime=norm*this.duration;
      const[progress,ss]=advanceTo(m.progress,1,m.spring,springTime,this.spring);
      m.progress=progress;m.spring=ss;
      const sample=samplePath(m.path,clamp(progress,0,1));
      this.position=sample.point;this.heading=sample.tangent;
      this._emit(now);
      if(norm>=1||isCloseEnough(progress,1,this.spring)){
        this.position={...m.target};
        const res=m.resolve;this._move=null;this.phase='idle';
        this._settleStart=now;
        this._emit(now);res?.();
      }
    } else if(this.phase==='idle'){
      this.idlePhase+=cdt*3;
      const iao=this.idleEnabled?Math.sin(this.idlePhase*0.8)*WOBBLE_AMP:0;
      this._emit(now,{idleAngleOffset:iao});
      // Stop loop once visual dynamics fully settled (no idle wiggle mode)
      const spd=Math.hypot(this.dynamics.tvx,this.dynamics.tvy);
      const settleT=now-(this._settleStart??now);
      if(!this.idleEnabled&&spd<2&&Math.abs(this.dynamics.angle)<0.02&&settleT>0.3){
        cancelAnimationFrame(this._rafId);this._rafId=null;
      }
    }
  }
  _emit(now,{idleAngleOffset=0}={}){
    const vis=this.dynamics.advance(this.position,now,{idleAngleOffset});
    this.onUpdate({phase:this.phase,sample:this.position,tip:vis.tip,angle:vis.angle,heading:this.heading,velocity:vis.velocity,angleVelocity:vis.angleVelocity,bodyOffset:vis.bodyOffset,fogOffset:vis.fogOffset,fogOpacity:vis.fogOpacity,fogScale:vis.fogScale,clickProgress:this.clickProgress,candidate:this._move?.candidate??null,candidates:this._move?.candidates??null});
  }
}

// ============================================================
// Renderer — matching reference cursor appearance
// Dark charcoal fill (closer to black visually) + white stroke
// Pointer path from SynthesizedCursorGlyphView contourRows data
// Multi-stop radial fog, motion compression, lateral sway
// ============================================================
const POINTER_PATH='M13.3 7.0 L11.9 8.7 L11.2 10.3 L11.9 12.0 L11.9 13.6 L12.6 15.3 L12.6 16.9 L12.6 18.6 L13.3 20.2 L13.3 21.9 L14.0 23.6 L14.0 25.2 L14.8 26.9 L14.8 28.5 L15.5 30.2 L16.2 31.0 L19.0 31.0 L19.8 29.3 L21.2 27.7 L21.9 26.0 L22.6 24.4 L24.8 22.7 L28.3 21.1 L30.5 19.4 L30.5 17.8 L30.5 16.1 L29.8 14.4 L26.9 12.8 L23.3 11.1 L20.5 9.5 L17.6 7.8 L15.5 7.0 Z';
const GLYPH_SVG=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" style="overflow:visible">
  <defs><radialGradient id="cm-fog">
    <stop offset="0%" stop-color="rgba(97,92,89,0.40)"/>
    <stop offset="50%" stop-color="rgba(110,105,102,0.28)"/>
    <stop offset="82%" stop-color="rgba(117,112,110,0.11)"/>
    <stop offset="100%" stop-color="rgba(153,153,153,0)"/>
  </radialGradient></defs>
  <circle class="cm-fog" cx="24" cy="24" r="33" fill="url(#cm-fog)"/>
  <path class="cm-ptr" d="${POINTER_PATH}"
        fill="rgba(56,53,51,0.98)"
        stroke="rgba(230,230,230,0.92)"
        stroke-width="1.6"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>`;

class DomCursorRenderer {
  constructor({container,showTrail=false,showCandidates=false}){
    this.container=container;this.showTrail=showTrail;this.showCandidates=showCandidates;
    this.root=document.createElement('div');
    Object.assign(this.root.style,{position:'absolute',inset:'0',pointerEvents:'none',zIndex:'9999',overflow:'visible'});
    this.svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    Object.assign(this.svg.style,{position:'absolute',inset:'0',width:'100%',height:'100%',pointerEvents:'none',overflow:'visible'});
    this.root.appendChild(this.svg);
    this.glyph=document.createElement('div');
    Object.assign(this.glyph.style,{position:'absolute',width:'48px',height:'48px',transformOrigin:'30% 14%',willChange:'transform'});
    this.glyph.innerHTML=GLYPH_SVG;
    this.root.appendChild(this.glyph);
    container.appendChild(this.root);
    this._trail=[];
  }
  onUpdate=(state)=>{
    const{tip,angle,clickProgress,candidate,candidates,bodyOffset,fogOffset,fogOpacity,fogScale}=state;
    if(!tip)return;
    // Motion compression (subtle squash along velocity)
    const bodyMag=Math.hypot(bodyOffset?.x??0,bodyOffset?.y??0);
    const motionComp=Math.min(bodyMag*0.008,0.018);
    const pulseComp=clickProgress*0.03;
    const scX=1-motionComp-pulseComp;
    const scY=1+(pulseComp*0.4);
    const bx=bodyOffset?.x??0,by=bodyOffset?.y??0;
    this.glyph.style.transform=`translate(${tip.x+bx}px,${tip.y+by}px) translate(-30%,-14%) rotate(${angle}rad) scale(${scX},${scY})`;
    // Fog: separate transform for offset + scale
    const fogEl=this.glyph.querySelector('.cm-fog');
    if(fogEl){
      const fox=fogOffset?.x??0,foy=fogOffset?.y??0,fs=fogScale??1;
      const fo=fogOpacity??0.12;
      const opMul=Math.max(0.28,Math.min(fo/0.12,2.2));
      fogEl.style.opacity=String(Math.min(opMul,1));
      fogEl.setAttribute('transform',`translate(${fox*0.7} ${foy*0.7}) scale(${fs})`);
      fogEl.setAttribute('transform-origin','24 24');
    }
    if(this.showTrail){this._trail.push({x:tip.x,y:tip.y});if(this._trail.length>300)this._trail.shift()}
    if(this.showCandidates||this.showTrail)this._redraw(candidate,candidates);
    else while(this.svg.firstChild)this.svg.removeChild(this.svg.firstChild);
  };
  _redraw(candidate,candidates){
    while(this.svg.firstChild)this.svg.removeChild(this.svg.firstChild);
    if(this.showCandidates&&candidates){
      for(const c of candidates){
        const el=document.createElementNS('http://www.w3.org/2000/svg','path');
        el.setAttribute('d',this._pathD(c.path));el.setAttribute('fill','none');
        el.setAttribute('stroke',c===candidate?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.12)');
        el.setAttribute('stroke-width',c===candidate?'2':'0.8');
        if(c!==candidate)el.setAttribute('stroke-dasharray','4 4');
        this.svg.appendChild(el);
      }
    }
    if(this.showTrail&&this._trail.length>1){
      const d=this._trail.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const el=document.createElementNS('http://www.w3.org/2000/svg','path');
      el.setAttribute('d',d);el.setAttribute('fill','none');
      el.setAttribute('stroke','rgba(140,200,255,0.7)');el.setAttribute('stroke-width','1.5');
      this.svg.appendChild(el);
    }
  }
  _pathD(path){
    if(!path.segments?.length)return'';
    let d=`M${path.start.x},${path.start.y}`;
    for(const seg of path.segments)d+=` C${seg.control1.x},${seg.control1.y} ${seg.control2.x},${seg.control2.y} ${seg.end.x},${seg.end.y}`;
    return d;
  }
}

// ============================================================
// DEMO
// ============================================================
const stage=document.getElementById('stage');
const renderer=new DomCursorRenderer({container:stage,showTrail:true,showCandidates:true});
const engine=new CursorMotionEngine({
  initial:{x:window.innerWidth/2,y:window.innerHeight/2},
  bounds:{minX:0,minY:0,maxX:window.innerWidth,maxY:window.innerHeight},
  onUpdate:(state)=>{
    renderer.onUpdate(state);
    document.getElementById('i-phase').textContent=state.phase;
    if(state.tip)document.getElementById('i-pos').textContent=`${state.tip.x.toFixed(0)}, ${state.tip.y.toFixed(0)}`;
    if(state.angle!=null)document.getElementById('i-angle').textContent=`${(state.angle*180/Math.PI).toFixed(1)}°`;
  },
  idle:false,
});

// Targets
const targetData=[{x:0.15,y:0.25,label:'A'},{x:0.75,y:0.18,label:'B'},{x:0.85,y:0.65,label:'C'},{x:0.35,y:0.75,label:'D'},{x:0.55,y:0.45,label:'E'}];
const targets=targetData.map(t=>{
  const el=document.createElement('div');el.className='target';el.textContent=t.label;
  el.style.left=`${t.x*100}%`;el.style.top=`${t.y*100}%`;el.style.transform='translate(-50%,-50%)';
  stage.appendChild(el);return{el,xPct:t.x,yPct:t.y};
});
function getTargetPos(t){return{x:t.xPct*window.innerWidth,y:t.yPct*window.innerHeight}}

targets.forEach(t=>{
  t.el.addEventListener('click',async e=>{
    e.stopPropagation();
    await engine.moveTo(getTargetPos(t));
    t.el.classList.add('hit');await engine.click();
    setTimeout(()=>t.el.classList.remove('hit'),400);
  });
});
stage.addEventListener('click',async e=>{
  if(e.target!==stage)return;
  await engine.moveTo({x:e.clientX,y:e.clientY});
  await engine.click();
});

// Sliders
function readParams(){
  return{startHandle:parseInt(document.getElementById('s-start').value)/100,endHandle:parseInt(document.getElementById('s-end').value)/100,arcSize:parseInt(document.getElementById('s-arc').value)/100,arcFlow:parseInt(document.getElementById('s-flow').value)/100};
}
function readSpring(){
  const s=parseInt(document.getElementById('s-spring').value)/100;
  const response=0.6+(1-s)*1.6,dampingFraction=0.7+0.4*(1-Math.abs(s-0.5)*2);
  return buildSpringConfig({response,dampingFraction});
}
['s-start','s-end','s-arc','s-flow','s-spring'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    document.getElementById('v-'+id.split('-')[1]).textContent=(parseInt(this.value)/100).toFixed(2);
    engine.setParams(readParams());
    if(id==='s-spring')engine.setSpring(readSpring());
  });
});
// Toggles
document.getElementById('t-trail').addEventListener('click',function(){this.classList.toggle('on');renderer.showTrail=this.classList.contains('on');if(!renderer.showTrail)renderer._trail=[]});
document.getElementById('t-cands').addEventListener('click',function(){this.classList.toggle('on');renderer.showCandidates=this.classList.contains('on')});
document.getElementById('t-idle').addEventListener('click',function(){this.classList.toggle('on');engine.idleEnabled=this.classList.contains('on');if(engine.idleEnabled)engine._startLoop()});
// Run Sequence
document.getElementById('run-btn').addEventListener('click',async function(){
  this.disabled=true;
  for(const t of targets){
    await engine.moveTo(getTargetPos(t));
    t.el.classList.add('hit');await engine.click();
    await new Promise(r=>setTimeout(r,200));t.el.classList.remove('hit');
  }
  this.disabled=false;
});
window.addEventListener('resize',()=>{engine.bounds={minX:0,minY:0,maxX:window.innerWidth,maxY:window.innerHeight}});
</script>
