<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Motion JS - Standalone Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1c2e;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e0e4f0;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
#stage {
  position: relative;
  width: 100%;
  height: 100%;
}
.target {
  position: absolute;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(120,160,255,0.25), rgba(60,80,180,0.08));
  border: 1.5px solid rgba(140,170,255,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: rgba(200,220,255,0.8);
  cursor: pointer;
  transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
  user-select: none;
}
.target:hover { border-color: rgba(180,210,255,0.7); transform: scale(1.08); }
.target.hit {
  animation: pulse 0.35s ease-out;
  border-color: rgba(100,255,180,0.8);
  box-shadow: 0 0 18px rgba(100,255,180,0.3);
}
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(0.88); }
  100% { transform: scale(1); }
}
#controls {
  position: absolute; top: 16px; left: 16px;
  background: rgba(20,22,40,0.92);
  border: 1px solid rgba(100,120,180,0.25);
  border-radius: 12px; padding: 16px 18px;
  backdrop-filter: blur(12px);
  min-width: 220px;
}
#controls h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(160,180,220,0.7); margin-bottom: 10px; }
.slider-row { display: flex; align-items: center; margin-bottom: 8px; }
.slider-row label { font-size: 11px; width: 90px; color: rgba(180,200,240,0.85); }
.slider-row input[type=range] { flex: 1; height: 4px; accent-color: #7b9cf5; }
.slider-row .val { font-size: 10px; width: 36px; text-align: right; color: rgba(140,160,200,0.7); }
#toggles { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
.toggle { font-size: 10px; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(100,130,200,0.3); background: rgba(40,50,80,0.5); cursor: pointer; }
.toggle.on { background: rgba(80,120,220,0.4); border-color: rgba(140,180,255,0.6); color: #fff; }
#info {
  position: absolute; bottom: 16px; left: 16px;
  font-size: 11px; color: rgba(140,160,200,0.6);
  background: rgba(20,22,40,0.8); padding: 8px 12px; border-radius: 8px;
}
#run-btn {
  position: absolute; top: 16px; right: 16px;
  font-size: 12px; padding: 8px 18px; border-radius: 8px;
  background: linear-gradient(135deg, #5b7cf5, #7b5cf5);
  border: none; color: #fff; cursor: pointer; font-weight: 600;
}
#run-btn:hover { filter: brightness(1.15); }
#run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="stage">
  <div id="controls">
    <h3>Parameters</h3>
    <div class="slider-row"><label>START HANDLE</label><input type="range" min="0" max="100" value="29" id="s-start"><span class="val" id="v-start">0.29</span></div>
    <div class="slider-row"><label>END HANDLE</label><input type="range" min="0" max="100" value="8" id="s-end"><span class="val" id="v-end">0.08</span></div>
    <div class="slider-row"><label>ARC SIZE</label><input type="range" min="0" max="100" value="6" id="s-arc"><span class="val" id="v-arc">0.06</span></div>
    <div class="slider-row"><label>ARC FLOW</label><input type="range" min="0" max="100" value="64" id="s-flow"><span class="val" id="v-flow">0.64</span></div>
    <div class="slider-row"><label>SPRING</label><input type="range" min="0" max="100" value="50" id="s-spring"><span class="val" id="v-spring">0.50</span></div>
    <div id="toggles">
      <span class="toggle on" id="t-trail">Trail</span>
      <span class="toggle on" id="t-cands">Candidates</span>
      <span class="toggle" id="t-idle">Idle Wiggle</span>
    </div>
  </div>
  <button id="run-btn">Run Sequence</button>
  <div id="info">Click anywhere or click targets to test. Phase: <span id="i-phase">idle</span> | Pos: <span id="i-pos">-</span></div>
</div>

<script>

  let staysInBounds = bounds ? pointInBounds(path.start, bounds, 20) : true;
  let prev = path.start, prevAngle = null;
  const totalSteps = Math.max(path.segments.length * Math.max(samplesPerSegment, 1), 1);
  for (let step = 1; step <= totalSteps; step++) {
    const progress = step / totalSteps;
    const { point } = samplePath(path, progress);
    const dx = point.x - prev.x, dy = point.y - prev.y;
    const stepLen = Math.hypot(dx, dy);
    if (bounds && staysInBounds) staysInBounds = pointInBounds(point, bounds, 20);
    if (stepLen > minStepDistance) {
      const angle = Math.atan2(dy, dx);
      totalLength += stepLen;
      if (prevAngle !== null) {
        let delta = angle - prevAngle;
        while (delta > Math.PI) delta -= 2 * Math.PI;
        while (delta < -Math.PI) delta += 2 * Math.PI;
        angleChangeEnergy += delta * delta;
        const abs = Math.abs(delta);
        if (abs > maxAngleChange) maxAngleChange = abs;
        totalTurn += abs;

      prev = point;

const DESCRIPTORS = [

class VisualDynamics {

    this.target = {x:initial.x, y:initial.y};

          this._emitFrame(performance.now()/1000);
          if (t<1) requestAnimationFrame(tick);
          else { this.clickProgress=0; pulse++; pulse<count ? setTimeout(startNext,gapMs) : startNext(); }
        };
        requestAnimationFrame(tick);
      };
      startNext();
    });
  }
  stop() { if(this._currentMove){this._currentMove.reject?.(new Error('stopped'));this._currentMove=null;} this._setPhase('idle'); }
  destroy() { this.stop(); if(this._rafId!=null){cancelAnimationFrame(this._rafId);this._rafId=null;} }
  _setPhase(p) { if(this.phase!==p){this.phase=p;this.onStateChange(p);} }
  _startLoop() {
    if (this._rafId!=null) return;
    const tick = (ms) => { this._rafId=null; this._step(ms/1000); this._rafId=requestAnimationFrame(tick); };
    this._rafId = requestAnimationFrame(tick);
  }
  _step(now) {
    if (this._currentMove) {
      const m = this._currentMove;
      if (m.startTime==null) m.startTime=now;
      const elapsed = now-m.startTime;
      const norm = clamp(elapsed/this.duration, 0, 1);
      const tgt = norm * this.duration;
      const [progress, springState] = advanceTo(m.progress, 1, m.spring, tgt, this.spring);
      m.progress = progress; m.spring = springState;
      const sample = samplePath(m.path, clamp(progress,0,1));
      this.position = sample.point;
      this.heading = sample.tangent;
      this._emitFrame(now);
      if (norm>=1 || isCloseEnough(progress,1,this.spring)) {
        this.position = {...m.target};
        const res = m.resolve; this._currentMove=null; this._setPhase('idle'); this._emitFrame(now); res?.();
      }
    } else if (this.phase==='idle' && this.idleEnabled) {
      this.idlePhase += 0.05;
      this._emitFrame(now, { idleAngleOffset: Math.sin(this.idlePhase*0.8)*0.09 });
    }
  }
  _emitFrame(now, {idleAngleOffset=0}={}) {
    const vis = this.dynamics.advance(this.position, now, {idleAngleOffset});
    this.onUpdate({ phase:this.phase, sample:this.position, tip:vis.tip, angle:vis.angle, heading:this.heading, velocity:vis.velocity, clickProgress:this.clickProgress, candidate:this._currentMove?.candidate??null, candidates:this._currentMove?.candidates??null });
  }
}

// ============================================================
// DOM Renderer (inline)
// ============================================================
const GLYPH_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs><radialGradient id="cm-fog" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(255,255,255,0.85)"/><stop offset="55%" stop-color="rgba(255,255,255,0.18)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
  <linearGradient id="cm-body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#d8dcec"/></linearGradient></defs>
  <circle cx="16" cy="16" r="15" fill="url(#cm-fog)"/><path d="M9 7 L23 15 L15 17 L13 25 Z" fill="url(#cm-body)" stroke="rgba(20,24,40,0.55)" stroke-width="0.9" stroke-linejoin="round"/></svg>`;

class DomCursorRenderer {
  constructor({ container, showTrail=false, showCandidates=false }) {
    this.container = container;
    this.showTrail = showTrail;
    this.showCandidates = showCandidates;
    this.root = document.createElement('div');
    Object.assign(this.root.style, { position:'absolute', inset:'0', pointerEvents:'none', zIndex:'9999', overflow:'visible' });
    this.svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    Object.assign(this.svg.style, { position:'absolute', inset:'0', width:'100%', height:'100%', pointerEvents:'none', overflow:'visible' });
    this.root.appendChild(this.svg);
    this.glyph = document.createElement('div');
    Object.assign(this.glyph.style, { position:'absolute', width:'32px', height:'32px', transformOrigin:'25% 25%', transform:'translate(-25%,-25%)', filter:'drop-shadow(0 4px 10px rgba(0,0,0,0.18))', willChange:'transform' });
    this.glyph.innerHTML = GLYPH_SVG;
    this.root.appendChild(this.glyph);
    container.appendChild(this.root);
    this._trail = [];
  }
  onUpdate = (state) => {
    const {tip,angle,clickProgress,candidate,candidates} = state;
    if (!tip) return;
    const sc = 1 - clickProgress*0.18;
    this.glyph.style.transform = `translate(${tip.x}px,${tip.y}px) translate(-25%,-25%) rotate(${angle}rad) scale(${sc})`;
    if (this.showTrail) { this._trail.push({x:tip.x,y:tip.y}); if(this._trail.length>300) this._trail.shift(); }
    if (this.showCandidates||this.showTrail) this._redraw({candidate,candidates});
    else if (this.svg.firstChild) while(this.svg.firstChild) this.svg.removeChild(this.svg.firstChild);
  };
  _redraw({candidate,candidates}) {
    while(this.svg.firstChild) this.svg.removeChild(this.svg.firstChild);
    if (this.showCandidates && candidates) {
      for (const c of candidates) {
        const el = document.createElementNS('http://www.w3.org/2000/svg','path');
        el.setAttribute('d', this._pathD(c.path));
        el.setAttribute('fill','none');
        el.setAttribute('stroke', c===candidate?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.15)');
        el.setAttribute('stroke-width', c===candidate?'2':'0.8');
        if (c!==candidate) el.setAttribute('stroke-dasharray','4 4');
        this.svg.appendChild(el);
      }
    }
    if (this.showTrail && this._trail.length>1) {
      const d = this._trail.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const el = document.createElementNS('http://www.w3.org/2000/svg','path');
      el.setAttribute('d',d); el.setAttribute('fill','none');
      el.setAttribute('stroke','rgba(140,200,255,0.7)'); el.setAttribute('stroke-width','1.5');
      this.svg.appendChild(el);
    }
  }
  _pathD(path) {
    if (!path.segments?.length) return '';
    let d = `M${path.start.x},${path.start.y}`;
    for (const seg of path.segments) d += ` C${seg.control1.x},${seg.control1.y} ${seg.control2.x},${seg.control2.y} ${seg.end.x},${seg.end.y}`;
    return d;
  }
}

// ============================================================
// DEMO LOGIC
// ============================================================
const stage = document.getElementById('stage');
const renderer = new DomCursorRenderer({ container: stage, showTrail: true, showCandidates: true });
const engine = new CursorMotionEngine({
  initial: { x: window.innerWidth/2, y: window.innerHeight/2 },
  bounds: { minX: 0, minY: 0, maxX: window.innerWidth, maxY: window.innerHeight },
  onUpdate: (state) => {
    renderer.onUpdate(state);
    document.getElementById('i-phase').textContent = state.phase;
    if (state.tip) document.getElementById('i-pos').textContent = `${state.tip.x.toFixed(0)}, ${state.tip.y.toFixed(0)}`;
  },
  onStateChange: () => {},
  idle: false,
});

// Targets
const targetData = [
  { x: 0.15, y: 0.25, label: 'A' },
  { x: 0.75, y: 0.18, label: 'B' },
  { x: 0.85, y: 0.65, label: 'C' },
  { x: 0.35, y: 0.75, label: 'D' },
  { x: 0.55, y: 0.45, label: 'E' },
];
const targets = targetData.map(t => {
  const el = document.createElement('div');
  el.className = 'target';
  el.textContent = t.label;
  el.style.left = `${t.x * 100}%`;
  el.style.top = `${t.y * 100}%`;
  el.style.transform = 'translate(-50%,-50%)';
  stage.appendChild(el);
  return { el, xPct: t.x, yPct: t.y, label: t.label };
});

function getTargetPos(t) {
  return { x: t.xPct * window.innerWidth, y: t.yPct * window.innerHeight };
}

targets.forEach(t => {
  t.el.addEventListener('click', async (e) => {
    e.stopPropagation();
    const pos = getTargetPos(t);
    await engine.moveTo(pos);
    t.el.classList.add('hit');
    await engine.click();
    setTimeout(() => t.el.classList.remove('hit'), 400);
  });
});

// Click anywhere on stage
stage.addEventListener('click', async (e) => {
  if (e.target !== stage) return;
  await engine.moveTo({ x: e.clientX, y: e.clientY });
  await engine.click();
});

// Sliders
function readParams() {
  return {
    startHandle: parseInt(document.getElementById('s-start').value) / 100,
    endHandle: parseInt(document.getElementById('s-end').value) / 100,
    arcSize: parseInt(document.getElementById('s-arc').value) / 100,
    arcFlow: parseInt(document.getElementById('s-flow').value) / 100,
  };
}
function readSpring() {
  const s = parseInt(document.getElementById('s-spring').value) / 100;
  const response = 0.6 + (1 - s) * 1.6;
  const dampingFraction = 0.7 + 0.4 * (1 - Math.abs(s - 0.5) * 2);
  return buildSpringConfig({ response, dampingFraction });
}
['s-start','s-end','s-arc','s-flow','s-spring'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    const val = (parseInt(el.value)/100).toFixed(2);
    document.getElementById('v-' + id.split('-')[1]).textContent = val;
    engine.setParams(readParams());
    if (id === 's-spring') engine.setSpring(readSpring());
  });
});

// Toggles
document.getElementById('t-trail').addEventListener('click', function() {
  this.classList.toggle('on');
  renderer.showTrail = this.classList.contains('on');
  if (!renderer.showTrail) renderer._trail = [];
});
document.getElementById('t-cands').addEventListener('click', function() {
  this.classList.toggle('on');
  renderer.showCandidates = this.classList.contains('on');
});
document.getElementById('t-idle').addEventListener('click', function() {
  this.classList.toggle('on');
  engine.idleEnabled = this.classList.contains('on');
});

// Run Sequence
document.getElementById('run-btn').addEventListener('click', async function() {
  this.disabled = true;
  for (const t of targets) {
    const pos = getTargetPos(t);
    await engine.moveTo(pos);
    t.el.classList.add('hit');
    await engine.click();
    await new Promise(r => setTimeout(r, 200));
    t.el.classList.remove('hit');
  }
  this.disabled = false;
});

// Resize handler
window.addEventListener('resize', () => {
  engine.bounds = { minX: 0, minY: 0, maxX: window.innerWidth, maxY: window.innerHeight };
});
</script>
